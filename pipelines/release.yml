stages:
  - stage: Release
    displayName: "Release"
    dependsOn:
      - FovuxMCP_Build
      - FovuxStudio_Build
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'), eq(variables['RELEASE_ENABLED'], 'true'), eq(variables['MANUAL_RELEASE_APPROVED'], 'true'))
    jobs:
      - job: Preflight
        displayName: "Release preflight"
        pool:
          vmImage: ubuntu-24.04
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
          - pwsh: bash scripts/verify_release.sh "$(Build.SourceBranchName)"
            displayName: Verify tag, versions, changelog, and upgrade guide

      - job: PublishPyPI
        displayName: "Publish fovux-mcp to PyPI"
        dependsOn: Preflight
        pool:
          vmImage: ubuntu-24.04
        steps:
          - download: current
            artifact: fovux-mcp-dist
          - bash: |
              set -euo pipefail
              python -m pip install twine
              curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh | sudo sh
              bash scripts/verify_doppler_release_secrets.sh
              mapfile -t artifacts < <(find "$(Pipeline.Workspace)/fovux-mcp-dist" -type f \( -name '*.whl' -o -name '*.tar.gz' \))
              doppler run \
                --project "${DOPPLER_PROJECT:-all}" \
                --config "${DOPPLER_CONFIG:-main}" \
                -- bash -c 'twine upload --non-interactive "$@" -u __token__ -p "$PYPI_TOKEN"' _ "${artifacts[@]}"
            displayName: Publish to PyPI
            env:
              DOPPLER_TOKEN: $(DOPPLER_TOKEN)
              DOPPLER_PROJECT: $(DOPPLER_PROJECT)
              DOPPLER_CONFIG: $(DOPPLER_CONFIG)

      - job: PublishVSIX
        displayName: "Publish fovux-studio to Marketplace"
        dependsOn: Preflight
        pool:
          vmImage: ubuntu-24.04
        steps:
          - download: current
            artifact: fovux-studio-vsix
          - bash: |
              set -euo pipefail
              npm install -g @vscode/vsce ovsx
              curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh | sudo sh
              bash scripts/verify_doppler_release_secrets.sh
            displayName: Install publish tooling
            env:
              DOPPLER_TOKEN: $(DOPPLER_TOKEN)
              DOPPLER_PROJECT: $(DOPPLER_PROJECT)
              DOPPLER_CONFIG: $(DOPPLER_CONFIG)
          - bash: |
              set -euo pipefail
              vsix="$(find "$(Pipeline.Workspace)/fovux-studio-vsix" -type f -name '*.vsix' -print -quit)"
              doppler run \
                --project "${DOPPLER_PROJECT:-all}" \
                --config "${DOPPLER_CONFIG:-main}" \
                -- bash -c 'vsce publish --packagePath "$1" --pat "$VSCE_PAT"' _ "$vsix"
            displayName: Publish to VS Code Marketplace
            env:
              DOPPLER_TOKEN: $(DOPPLER_TOKEN)
              DOPPLER_PROJECT: $(DOPPLER_PROJECT)
              DOPPLER_CONFIG: $(DOPPLER_CONFIG)
          - bash: |
              set -euo pipefail
              vsix="$(find "$(Pipeline.Workspace)/fovux-studio-vsix" -type f -name '*.vsix' -print -quit)"
              doppler run \
                --project "${DOPPLER_PROJECT:-all}" \
                --config "${DOPPLER_CONFIG:-main}" \
                -- bash -c 'ovsx publish "$1" -p "$OVSX_PAT"' _ "$vsix"
            displayName: Publish to Open VSX
            env:
              DOPPLER_TOKEN: $(DOPPLER_TOKEN)
              DOPPLER_PROJECT: $(DOPPLER_PROJECT)
              DOPPLER_CONFIG: $(DOPPLER_CONFIG)

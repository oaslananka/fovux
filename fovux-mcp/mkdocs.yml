site_name: Fovux MCP
site_description: Professional-grade edge-AI computer vision workbench MCP server
site_url: https://oaslananka.github.io/fovux/
repo_url: https://github.com/oaslananka/fovux
repo_name: oaslananka/fovux
edit_uri: edit/main/fovux-mcp/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - Upgrade:
      - v2.0.0 Upgrade Guide: upgrade/v2.md
  - Tools:
      - Dataset:
          - annotation_quality_check: tools/annotation_quality_check.md
          - dataset_inspect: tools/dataset_inspect.md
          - dataset_validate: tools/dataset_validate.md
          - dataset_find_duplicates: tools/dataset_find_duplicates.md
          - dataset_split: tools/dataset_split.md
          - dataset_convert: tools/dataset_convert.md
          - dataset_augment: tools/dataset_augment.md
          - active_learning_select: tools/active_learning_select.md
      - Training:
          - train_start: tools/train_start.md
          - train_status: tools/train_status.md
          - train_stop: tools/train_stop.md
          - train_resume: tools/train_resume.md
          - train_adjust: tools/train_adjust.md
          - distill_model: tools/distill_model.md
      - Evaluation:
          - eval_run: tools/eval_run.md
          - eval_per_class: tools/eval_per_class.md
          - eval_error_analysis: tools/eval_error_analysis.md
          - eval_compare: tools/eval_compare.md
      - Export and Quantization:
          - export_onnx: tools/export_onnx.md
          - export_tflite: tools/export_tflite.md
          - quantize_int8: tools/quantize_int8.md
          - quantize_report: tools/quantize_report.md
      - Inference and Benchmarking:
          - fovux_doctor: tools/fovux_doctor.md
          - infer_image: tools/infer_image.md
          - infer_batch: tools/infer_batch.md
          - infer_rtsp: tools/infer_rtsp.md
          - infer_ensemble: tools/infer_ensemble.md
          - benchmark_latency: tools/benchmark_latency.md
      - Management:

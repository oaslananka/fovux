name: Bug Report
description: Report a bug in Fovux MCP
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Fovux MCP version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Ubuntu / Debian
        - Windows 11
        - Other Linux
        - Other
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.9"
    validations:
      required: true

  - type: input
    id: tool
    attributes:
      label: Which tool caused the bug?
      placeholder: "e.g. dataset_inspect, train_start"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include the tool inputs if possible.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      render: shell

name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before requesting a feature, please check that it is not in the
        [project status and scope notes](https://github.com/oaslananka/Fovux/tree/main/Fovux-mcp#status).

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case and why existing tools don't cover it.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you try?

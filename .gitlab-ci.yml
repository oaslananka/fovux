# Gitlab CI is provided for community mirrors only. Release publish is disabled.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

stages:
  - validate
  - build

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

mcp:validate:
  stage: validate
  image: python:3.13
  when: manual
  script:
    - python -m pip install uv
    - cd fovux-mcp
    - uv sync --extra dev
    - uv run ruff check src tests
    - uv run ruff format --check src tests
    - uv run mypy --strict --warn-unused-ignores src/fovux
    - uv run pytest tests --no-header -q
    - uv run mkdocs build --strict
    - uv run python ../scripts/lint_docs_code.py docs

studio:validate:
  stage: validate
  image: node:22
  when: manual
  script:
    - npm install -g pnpm
    - cd fovux-studio
    - pnpm install --frozen-lockfile
    - pnpm lint
    - pnpm typecheck
    - pnpm test
    - pnpm audit --prod
    - pnpm build

artifacts:build:
  stage: build
  image: node:22-bookworm
  when: manual
  needs: []
  script:
    - apt-get update
    - apt-get install -y python3 python3-pip python-is-python3
    - python -m pip install --break-system-packages uv build cyclonedx-bom
    - npm install -g pnpm
    - cd fovux-mcp
    - uv sync --extra dev
    - uv export --no-dev --no-editable --no-hashes --output-file requirements-build.txt
    - python -m cyclonedx_py requirements requirements-build.txt -o sbom.cdx.json
    - uv run python ../scripts/build_spdx_sbom.py --output sbom.spdx
    - python -m build
    - cd ../fovux-studio
    - pnpm install --frozen-lockfile
    - pnpm build
    - pnpm exec vsce package --out fovux-studio.vsix --no-dependencies
  artifacts:
    when: always
    paths:
      - fovux-mcp/dist/
      - fovux-mcp/sbom.cdx.json
      - fovux-mcp/sbom.spdx
      - fovux-studio/fovux-studio.vsix

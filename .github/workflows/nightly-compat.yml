name: Nightly Compatibility

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  compat:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Test with latest deps
        working-directory: fovux-mcp
        id: test
        continue-on-error: true
        run: bash scripts/test_with_latest_deps.sh

      - name: Create issue on failure
        if: steps.test.outcome == 'failure'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Nightly compat break: ${{ github.sha }}"
          content-filepath: fovux-mcp/nightly-compat-report.txt
          labels: compat-break

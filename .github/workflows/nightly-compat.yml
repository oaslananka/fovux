name: Nightly Compatibility

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  compat:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true

      - name: Test with latest deps
        working-directory: fovux-mcp
        id: test
        continue-on-error: true
        run: bash scripts/test_with_latest_deps.sh

      - name: Create issue on failure
        if: steps.test.outcome == 'failure'
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710
        with:
          title: "Nightly compat break: ${{ github.sha }}"
          content-filepath: fovux-mcp/nightly-compat-report.txt
          labels: compat-break

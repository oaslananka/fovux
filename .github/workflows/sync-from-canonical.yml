name: Sync from canonical

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [canonical-push]

permissions:
  contents: write

concurrency:
  group: sync-from-canonical
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout org mirror
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pull from canonical and replay
        env:
          MIRROR_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "oaslananka-lab[bot]"
          git config user.email "oaslananka-lab@users.noreply.github.com"

          if [ -n "${MIRROR_TOKEN:-}" ]; then
            canonical_url="https://x-access-token:${MIRROR_TOKEN}@github.com/oaslananka/fovux.git"
          else
            canonical_url="https://github.com/oaslananka/fovux.git"
          fi
          git remote add canonical "${canonical_url}"
          git fetch canonical --prune --tags

          git push origin "refs/remotes/canonical/main:refs/heads/main" --force
          git push origin --tags --force

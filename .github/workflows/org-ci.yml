name: Org CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_slow:
        description: "Run slow backend validation"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mcp:
    name: fovux-mcp / Python ${{ matrix.python-version }}
    if: github.repository == 'oaslananka-lab/fovux'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2025]
        python-version: ["3.13"]
        include:
          - os: ubuntu-24.04
            python-version: "3.11"
          - os: ubuntu-24.04
            python-version: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('fovux-mcp/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-
            uv-${{ runner.os }}-

      - name: Install dependencies
        working-directory: fovux-mcp
        run: uv sync --locked --extra dev

      - name: Version coherence check
        run: python scripts/check_versions.py

      - name: Backend quality gate
        run: python scripts/quality_gate.py mcp-check

      - name: Security scan (bandit + pip-audit)
        if: matrix.python-version == '3.13'
        working-directory: fovux-mcp
        run: |
          uv run bandit -r src/fovux -ll
          uv export --no-dev --no-editable --no-hashes --output-file requirements-audit.txt
          uv run pip-audit --requirement requirements-audit.txt

      - name: Contract test
        if: matrix.python-version == '3.13'
        working-directory: fovux-mcp
        run: uv run pytest tests/contract -v --no-cov

      - name: Slow validation
        if: github.event_name == 'workflow_dispatch' && inputs.run_slow == 'true' && matrix.python-version == '3.13'
        working-directory: fovux-mcp
        run: uv run pytest tests -m slow --no-header -q

      - name: Scheduled chaos and security validation
        if: github.event_name == 'schedule' && matrix.python-version == '3.13'
        working-directory: fovux-mcp
        run: uv run pytest tests/chaos tests/security -v --timeout=120

  docs:
    name: fovux-mcp / docs
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        working-directory: fovux-mcp
        run: uv sync --locked --extra dev

      - name: Build docs
        run: python scripts/quality_gate.py mcp-docs

  studio:
    name: fovux-studio
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install dependencies
        working-directory: fovux-studio
        run: pnpm install --frozen-lockfile

      - name: Validate extension
        working-directory: fovux-studio
        run: pnpm verify

  build-artifacts:
    name: Build release artifacts
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [mcp, docs, studio]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install tooling
        run: |
          python -m pip install uv
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Build Python artifacts
        working-directory: fovux-mcp
        run: |
          uv sync --locked --extra dev
          uv export --no-dev --no-editable --no-hashes --output-file requirements-build.txt
          uv run python -m cyclonedx_py requirements requirements-build.txt -o sbom.cdx.json
          uv run python ../scripts/build_spdx_sbom.py --output sbom.spdx
          uv run python -m build

      - name: Build VSIX
        working-directory: fovux-studio
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm exec vsce package --out fovux-studio.vsix --no-dependencies

      - name: Upload Python dist
        uses: actions/upload-artifact@v7
        with:
          name: fovux-mcp-dist
          path: fovux-mcp/dist/*

      - name: Upload SBOMs
        uses: actions/upload-artifact@v7
        with:
          name: fovux-mcp-sbom
          path: |
            fovux-mcp/sbom.cdx.json
            fovux-mcp/sbom.spdx

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: fovux-studio-vsix
          path: fovux-studio/fovux-studio.vsix

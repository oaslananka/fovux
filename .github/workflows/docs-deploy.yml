name: Docs Deploy

on:
  push:
    branches: [main]
    paths:
      - "fovux-mcp/docs/**"
      - "fovux-mcp/mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: fovux-mcp
        run: uv sync --locked --extra dev

      - name: Deploy docs
        working-directory: fovux-mcp
        run: uv run mkdocs gh-deploy --strict --force

name: Docs Deploy

on:
  push:
    branches: [main]
    paths:
      - "fovux-mcp/docs/**"
      - "fovux-mcp/mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4      - name: Set up Python
        uses: actions/setup-python@v5        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        working-directory: fovux-mcp
        run: uv sync --locked --extra dev

      - name: Deploy docs
        working-directory: fovux-mcp
        run: uv run mkdocs gh-deploy --strict --force


name: Lock closed threads

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@v5
        with:
          issue-lock-inactive-days: 30
          pr-lock-inactive-days: 30


name: Release

# Release publishing requires the Doppler CLI plus a DOPPLER_TOKEN secret with
# access to project=all/config=main. Dry-run builds still verify that the token
# can read the required release secrets before packaging.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v1.2.3)"
        required: true
      publish:
        description: Publish to registries
        type: choice
        default: "false"
        options: ["false", "true"]
      approval:
        description: Type APPROVE_RELEASE to confirm publish
        required: false

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Validate approval
        run: |
          if [ "${{ inputs.publish }}" = "true" ] && [ "${{ inputs.approval }}" != "APPROVE_RELEASE" ]; then
            echo "Set approval=APPROVE_RELEASE to publish" >&2; exit 1
          fi

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@4819d808ab99e5cde19a0637a16536a4038fad73
      - name: Verify required Doppler secrets
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: bash scripts/verify_doppler_secrets.sh

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - name: Build (Python)
        run: |
          cd fovux-mcp
          uv sync --locked --extra dev
          uv run python -m build

      - name: Generate SPDX SBOM
        run: |
          cd fovux-mcp
          uv run python ../scripts/build_spdx_sbom.py --output ../sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with: { node-version-file: .nvmrc }
      - name: Build (Node)
        run: |
          cd fovux-studio
          npm install --global pnpm@10.33.0
          pnpm --version
          pnpm install --frozen-lockfile
          pnpm build
          pnpm exec vsce package --out fovux-studio.vsix --no-dependencies
          pnpm check:bundle-size

      - name: Sigstore sign (Python)
        if: hashFiles('fovux-mcp/dist/*.whl') != ''
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc
        with:
          inputs: fovux-mcp/dist/*.whl fovux-mcp/dist/*.tar.gz

      - name: Build provenance attestation (Python)
        if: hashFiles('fovux-mcp/dist/*') != ''
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: "fovux-mcp/dist/*"

      - name: Build provenance attestation (Node)
        if: hashFiles('fovux-studio/*.vsix') != ''
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: "fovux-studio/*.vsix"

      - name: Publish
        if: inputs.publish == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --project all --config main -- bash scripts/publish.sh

      - name: Create GitHub release (draft if not publishing)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh_args=(--repo "${{ github.repository }}" \
                   --title "${{ inputs.version }}" \
                   --generate-notes)
          if [ "${{ inputs.publish }}" != "true" ]; then
            gh_args+=(--draft)
          fi
          assets=()
          if compgen -G "fovux-mcp/dist/*" > /dev/null; then assets+=(fovux-mcp/dist/*); fi
          if compgen -G "fovux-studio/*.vsix" > /dev/null; then assets+=(fovux-studio/*.vsix); fi
          if [ -f "sbom.spdx.json" ]; then assets+=(sbom.spdx.json); fi
          if gh release view "${{ inputs.version }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${{ inputs.version }}" --repo "${{ github.repository }}" "${assets[@]}" --clobber
            if [ "${{ inputs.publish }}" = "true" ]; then
              gh release edit "${{ inputs.version }}" \
                --repo "${{ github.repository }}" \
                --draft=false \
                --latest \
                --verify-tag \
                --target "${GITHUB_SHA}"
            fi
          else
            gh release create "${{ inputs.version }}" "${gh_args[@]}" "${assets[@]}"
          fi

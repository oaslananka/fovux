name: Jules auto-trigger

on:
  issues:
    types: [labeled]

permissions:
  issues: read

jobs:
  trigger:
    if: |-
      (github.repository == 'oaslananka-lab/fovux') && (
        contains(fromJSON('["type:bug","type:docs","type:refactor","good first issue"]'),
                 github.event.label.name)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4      - name: Trigger Jules session
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --project all --config main -- bash -c '
            curl -fsSL -X POST https://jules.googleapis.com/v1alpha/sessions \
              -H "x-goog-api-key: $JULES_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"prompt\": \"Resolve issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}. Body:\n\n${{ github.event.issue.body }}\",
                \"sourceContext\": {\"source\": \"sources/github/${{ github.repository }}\", \"githubRepoContext\": {\"startingBranch\": \"main\"}},
                \"automationMode\": \"AUTO_CREATE_PR\",
                \"title\": \"#${{ github.event.issue.number }}\"
              }"
          '


name: Lint (fast)

on:
  pull_request:
  push:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: lint-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: actionlint
        uses: raven-actions/actionlint@v2.1.2
        with:
          fail-on-error: true
      - name: yamllint
        run: |
          python -m pip install --quiet yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .github/

  python:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uvx ruff check fovux-mcp
      - run: uvx ruff format --check fovux-mcp

  node:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install Node dependencies
        run: |
          cd fovux-studio
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm install --frozen-lockfile
      - name: Lint
        run: |
          cd fovux-studio
          pnpm run lint

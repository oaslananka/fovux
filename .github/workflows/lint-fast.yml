name: Lint (fast)

on:
  pull_request:
  push:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: lint-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8
        with:
          fail-on-error: true
      - name: yamllint
        run: |
          python -m pip install --quiet yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .github/

  python:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - run: uvx ruff check fovux-mcp
      - run: uvx ruff format --check fovux-mcp

  node:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
      - name: Install Node dependencies
        run: |
          cd fovux-studio
          npm install --global pnpm@10.33.0
          pnpm --version
          pnpm install --frozen-lockfile
      - name: Lint
        run: |
          cd fovux-studio
          pnpm run lint

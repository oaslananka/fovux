name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_slow:
        description: "Run slow backend validation"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    if: github.repository == 'oaslananka-lab/fovux'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-task@v2
        with:
          version: 3.x

      - uses: astral-sh/setup-uv@v5
        if: hashFiles('fovux-mcp/pyproject.toml') != ''
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        if: hashFiles('fovux-studio/package.json') != ''
        with:
          node-version-file: 'fovux-studio/package.json'

      - name: Install dependencies
        run: task install

      - name: Run CI
        run: task ci

      - name: Publish test results
        if: always() && hashFiles('**/junit.xml', '**/test-results.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            **/junit.xml
            **/test-results.xml

      - name: Test summary
        if: always() && hashFiles('**/junit.xml') != ''
        uses: test-summary/action@v2.4
        with:
          paths: "**/junit.xml"

      - name: Upload coverage
        if: always() && hashFiles('**/coverage.xml', 'fovux-studio/coverage') != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: fovux-mcp/coverage.xml
          directory: fovux-studio/coverage

      - name: Install Doppler CLI
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: dopplerhq/cli-action@v4

      - name: Notify Jules on failure
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --project all --config main -- bash -c '
            curl -fsSL -X POST https://jules.googleapis.com/v1alpha/sessions \
              -H "x-goog-api-key: $JULES_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg prompt "CI job ${{ github.job }} failed on ${{ github.ref_name }}. Run: ${{ github.run_id }}. Diagnose root cause, fix, open PR." \
                --arg src "sources/github/${{ github.repository }}" \
                --arg title "ci-fix: ${{ github.job }}" \
                "{prompt: \$prompt, sourceContext: {source: \$src, githubRepoContext: {startingBranch: \"main\"}}, automationMode: \"AUTO_CREATE_PR\", title: \$title}")"
          '

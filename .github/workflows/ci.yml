name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_slow:
        description: "Run slow backend validation"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    if: github.repository == 'oaslananka-lab/fovux'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
        node-version: ["22", "24.14.1"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        if: hashFiles('fovux-mcp/pyproject.toml') != ''
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v7
        if: hashFiles('fovux-mcp/pyproject.toml') != ''
        with:
          enable-cache: true

      - uses: actions/setup-node@v6
        if: hashFiles('fovux-studio/package.json') != ''
        with:
          node-version: ${{ matrix.node-version }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: false

      - name: Install Task
        shell: bash
        run: |
          go install github.com/go-task/task/v3/cmd/task@v3.50.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install actionlint
        shell: bash
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install pnpm
        if: hashFiles('fovux-studio/package.json') != ''
        run: |
          npm install --global pnpm@10.33.0
          pnpm --version

      - name: Install dependencies
        run: task install

      - name: Run CI
        run: task ci

      - name: Publish test results
        if: always() && runner.os == 'Linux' && hashFiles('**/junit.xml', '**/test-results.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@v2.23.0
        with:
          files: |
            **/junit.xml
            **/test-results.xml

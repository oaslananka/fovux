name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "39 12 * * 3"

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    if: github.repository == 'oaslananka-lab/fovux'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Python security checks
        working-directory: fovux-mcp
        run: |
          uv sync --locked --extra dev
          uv run bandit -r src/fovux -ll
          uv export --no-dev --no-editable --no-hashes --output-file requirements-audit.txt
          uv run pip-audit --requirement requirements-audit.txt

      - name: Node production audit
        working-directory: fovux-studio
        run: |
          npm install --global pnpm@10.33.0
          pnpm --version
          pnpm install --frozen-lockfile
          pnpm audit --prod

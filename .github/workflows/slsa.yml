name: SLSA Provenance

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  provenance:
    if: github.repository == 'oaslananka-lab/fovux'
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a
    with:
      base64-subjects-as-file: true
      upload-assets: true

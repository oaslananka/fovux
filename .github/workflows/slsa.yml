name: SLSA Provenance

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  provenance:
    if: github.repository == 'oaslananka-lab/fovux'
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects-as-file: true
      upload-assets: true


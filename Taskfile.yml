version: '3'

dotenv: ['.env']

vars:
  PYTHON: '{{.PYTHON | default "python"}}'

tasks:
  install:
    desc: Install all dev dependencies
    cmds:
      - cmd: |
          cd fovux-mcp
          uv sync --all-extras --dev
        platforms: [linux, darwin, windows]
        ignore_error: false
      - cmd: |
          cd fovux-studio
          corepack enable && pnpm install --frozen-lockfile
        ignore_error: true

  hooks:
    desc: Install git hooks
    cmds:
      - pre-commit install --install-hooks
      - pre-commit install --hook-type commit-msg
      - pre-commit install --hook-type pre-push

  format:
    desc: Auto-format the codebase
    cmds:
      - cmd: |
          cd fovux-mcp
          uvx ruff check --fix .
      - cmd: |
          cd fovux-mcp
          uvx ruff format .
      - cmd: |
          cd fovux-studio
          pnpm prettier --write . || true
        ignore_error: true

  lint:
    desc: Run all linters (read-only)
    cmds:
      - cmd: |
          cd fovux-mcp
          uvx ruff check .
      - cmd: |
          cd fovux-mcp
          uvx ruff format --check .
      - cmd: |
          cd fovux-studio
          pnpm run lint || true
        ignore_error: true
      - cmd: actionlint || true
        ignore_error: true

  typecheck:
    desc: Static type checking
    cmds:
      - cmd: |
          cd fovux-mcp
          uv run mypy src
      - cmd: |
          cd fovux-studio
          pnpm run typecheck || pnpm exec tsc --noEmit
        ignore_error: true

  test:
    desc: Run unit tests
    cmds:
      - cmd: |
          cd fovux-mcp
          uv run pytest -x --no-header -q
      - cmd: |
          cd fovux-studio
          pnpm test --run
        ignore_error: true

  test:fast:
    desc: Run only fast tests
    cmds:
      - cmd: |
          cd fovux-mcp
          uv run pytest -x --no-header -q -m "not slow"

  test:cov:
    desc: Run tests with coverage
    cmds:
      - cmd: |
          cd fovux-mcp
          uv run pytest --cov --cov-report=term-missing --cov-report=xml

  security:
    desc: Security scans
    cmds:
      - cmd: |
          cd fovux-mcp
          uvx bandit -r src -q
      - cmd: |
          cd fovux-mcp
          uvx pip-audit
      - cmd: gitleaks detect --no-banner --redact

  pre-push:
    desc: What pre-push hook runs (typecheck + fast tests + workflow lint)
    cmds:
      - task: typecheck
      - task: test:fast
      - cmd: actionlint || true

  ci:
    desc: Run the exact CI pipeline locally — full parity
    cmds:
      - task: lint
      - task: typecheck
      - task: test:cov
      - task: security

  ci:act:
    desc: Run GitHub Actions workflows locally with nektos/act
    cmds:
      - act -W .github/workflows/ci.yml --container-architecture linux/amd64

  doppler:check:
    desc: Verify all required Doppler secrets are present
    cmds:
      - bash scripts/verify_doppler_secrets.sh

  clean:
    desc: Remove build artifacts and caches
    cmds:
      - cmd: rm -rf dist build .pytest_cache .mypy_cache .ruff_cache htmlcov coverage.xml junit.xml
        platforms: [linux, darwin]
      - cmd: powershell -Command "Remove-Item -Recurse -Force dist,build,.pytest_cache,.mypy_cache,.ruff_cache,htmlcov,coverage.xml,junit.xml -ErrorAction SilentlyContinue"
        platforms: [windows]

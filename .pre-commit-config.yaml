minimum_pre_commit_version: "4.0.0"
default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown]

  - repo: local
    hooks:
      - id: fovux-pre-commit
        name: fovux pre-commit (fast staged checks)
        entry: uv run --project fovux-mcp python scripts/quality_gate.py pre-commit
        language: system
        pass_filenames: true
        stages:
          - pre-commit
        files: ^(fovux-mcp/|fovux-studio/|docs/|scripts/|README\.md|RELEASE_NOTES\.md|azure-pipelines\.yml|\.github/workflows/|pipelines/|\.nvmrc)
      - id: forbid-build-artifacts
        name: forbid committing build artifacts
        entry: python scripts/forbid_build_artifacts.py
        language: system
        pass_filenames: true
        stages:
          - pre-commit
      - id: fovux-pre-push
        name: fovux pre-push (full local validation)
        entry: uv run --project fovux-mcp python scripts/quality_gate.py pre-push
        language: system
        pass_filenames: false
        stages:
          - pre-push
      - id: check-versions
        name: check monorepo version coherence
        entry: uv run --project fovux-mcp python scripts/check_versions.py
        language: system
        pass_filenames: false
        stages:
          - pre-push
